<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>StreetWear Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body class="bg-neutral-100">
    <div id="app"></div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const SUPABASE_URL = "https://ksmycnupavkipgscjqym.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzbXljbnVwYXZraXBnc2NqcXltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODQ5MDcsImV4cCI6MjA5MTU2MDkwN30.ggrrgysNbeVIF77DgbxbijSDrEq9-IXP5b4v8sSzgp0";

      const products = [
        {
          id: 1,
          title: "Худи Oversize Black",
          price: 3500,
          category: "Худи",
          image:
            "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80",
          description: "Плотное оверсайз худи на каждый день.",
          sizes: ["S", "M", "L"],
        },
        {
          id: 2,
          title: "Футболка Basic White",
          price: 1990,
          category: "Футболки",
          image:
            "https://images.unsplash.com/photo-1503341504253-dff4815485f1?auto=format&fit=crop&w=900&q=80",
          description: "Базовая футболка свободного кроя.",
          sizes: ["S", "M", "L", "XL"],
        },
        {
          id: 3,
          title: "Кроссовки Street",
          price: 6200,
          category: "Обувь",
          image:
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80",
          description: "Повседневные кроссовки в городском стиле.",
          sizes: ["40", "41", "42", "43"],
        },
        {
          id: 4,
          title: "Кепка Minimal",
          price: 1490,
          category: "Аксессуары",
          image:
            "https://images.unsplash.com/photo-1521369909029-2afed882baee?auto=format&fit=crop&w=900&q=80",
          description: "Лаконичная кепка с минималистичным дизайном.",
          sizes: ["One Size"],
        },
      ];

      let screen = "store";
      let cart = [];
      let selectedProduct = null;
      let selectedSize = "";

      function formatPrice(price) {
        return price.toLocaleString("ru-RU") + " ₽";
      }

      function renderHeader(title, showBack = false, backTarget = "store") {
        return `
          <div class="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-neutral-200">
            <div class="max-w-md mx-auto px-4 py-4 flex items-center gap-3">
              ${
                showBack
                  ? `<button class="text-sm rounded-xl border border-neutral-200 px-3 py-2" onclick="goTo('${backTarget}')">Назад</button>`
                  : ""
              }
              <div class="text-lg font-semibold">${title}</div>
            </div>
          </div>
        `;
      }

      function renderProductGrid(items) {
        return items
          .map(
            (product) => `
            <div class="rounded-3xl overflow-hidden bg-white border border-neutral-200 shadow-sm cursor-pointer" onclick="openProduct(${product.id})">
              <div class="h-48 bg-neutral-100">
                <img src="${product.image}" alt="${product.title}" class="w-full h-full object-cover" />
              </div>
              <div class="p-3">
                <div class="text-xs text-neutral-500">${product.category}</div>
                <div class="font-medium mt-1 leading-5">${product.title}</div>
                <div class="mt-2 font-semibold">${formatPrice(product.price)}</div>
              </div>
            </div>
          `
          )
          .join("");
      }

      function renderStore() {
        const app = document.getElementById("app");
        app.innerHTML = `
          ${renderHeader("StreetWear Store")}
          <div class="max-w-md mx-auto px-4 pb-28">
            <div class="pt-4">
              <div class="rounded-3xl overflow-hidden bg-white border border-neutral-200 shadow-sm">
                <div class="h-40 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1400&q=80')"></div>
                <div class="p-4">
                  <div class="text-xl font-semibold">StreetWear Store</div>
                  <div class="text-sm text-neutral-500 mt-1">Стильная уличная одежда внутри Telegram</div>
                </div>
              </div>
            </div>

            <div class="mt-4">
              <input
                class="w-full rounded-2xl border border-neutral-200 bg-white px-4 py-3 outline-none"
                placeholder="Поиск товаров"
                oninput="searchProducts(this.value)"
              />
            </div>

            <div class="mt-4 flex gap-2 overflow-x-auto pb-1">
              <button class="whitespace-nowrap rounded-full bg-black text-white px-4 py-2 text-sm">Все</button>
              <button class="whitespace-nowrap rounded-full bg-white border border-neutral-200 px-4 py-2 text-sm">Худи</button>
              <button class="whitespace-nowrap rounded-full bg-white border border-neutral-200 px-4 py-2 text-sm">Футболки</button>
              <button class="whitespace-nowrap rounded-full bg-white border border-neutral-200 px-4 py-2 text-sm">Обувь</button>
              <button class="whitespace-nowrap rounded-full bg-white border border-neutral-200 px-4 py-2 text-sm">Аксессуары</button>
            </div>

            <div class="mt-5 grid grid-cols-2 gap-4" id="product-grid">
              ${renderProductGrid(products)}
            </div>
          </div>

          ${renderBottomBar()}
        `;
      }

      function renderProduct() {
        const app = document.getElementById("app");
        const product = selectedProduct;
        app.innerHTML = `
          ${renderHeader(product.title, true, "store")}
          <div class="max-w-md mx-auto px-4 pb-32">
            <div class="pt-4">
              <div class="rounded-3xl overflow-hidden bg-white border border-neutral-200 shadow-sm">
                <img src="${product.image}" alt="${product.title}" class="w-full h-80 object-cover" />
              </div>
            </div>

            <div class="mt-4 rounded-3xl bg-white border border-neutral-200 shadow-sm p-4">
              <div class="text-sm text-neutral-500">${product.category}</div>
              <div class="text-2xl font-semibold mt-1">${product.title}</div>
              <div class="text-xl font-semibold mt-3">${formatPrice(product.price)}</div>
              <div class="text-neutral-600 mt-3">${product.description}</div>

              <div class="mt-5">
                <div class="text-sm font-medium mb-2">Размер</div>
                <div class="flex flex-wrap gap-2">
                  ${product.sizes
                    .map(
                      (size) => `
                    <button
                      class="rounded-xl border px-4 py-2 text-sm ${
                        selectedSize === size
                          ? "bg-black text-white border-black"
                          : "bg-white border-neutral-200"
                      }"
                      onclick="selectSize('${size}')"
                    >
                      ${size}
                    </button>
                  `
                    )
                    .join("")}
                </div>
              </div>
            </div>
          </div>

          <div class="fixed bottom-0 left-0 right-0 border-t border-neutral-200 bg-white">
            <div class="max-w-md mx-auto p-4">
              <button
                class="w-full rounded-2xl bg-black text-white py-4 text-sm font-medium"
                onclick="addToCart()"
              >
                Добавить в корзину
              </button>
            </div>
          </div>
        `;
      }

      function renderCart() {
        const app = document.getElementById("app");
        const total = cart.reduce((sum, item) => sum + item.price, 0);

        app.innerHTML = `
          ${renderHeader("Корзина", true, "store")}
          <div class="max-w-md mx-auto px-4 pb-32">
            <div class="pt-4 space-y-3">
              ${
                cart.length === 0
                  ? `
                    <div class="rounded-3xl bg-white border border-neutral-200 p-6 text-neutral-500 text-center">
                      Корзина пока пуста
                    </div>
                  `
                  : cart
                      .map(
                        (item, index) => `
                      <div class="rounded-3xl bg-white border border-neutral-200 shadow-sm p-3 flex gap-3">
                        <img src="${item.image}" alt="${item.title}" class="w-20 h-20 rounded-2xl object-cover" />
                        <div class="flex-1">
                          <div class="font-medium">${item.title}</div>
                          <div class="text-sm text-neutral-500 mt-1">Размер: ${item.size || "не выбран"}</div>
                          <div class="font-semibold mt-2">${formatPrice(item.price)}</div>
                        </div>
                        <button class="text-sm text-neutral-500" onclick="removeFromCart(${index})">✕</button>
                      </div>
                    `
                      )
                      .join("")
              }
            </div>
          </div>

          <div class="fixed bottom-0 left-0 right-0 border-t border-neutral-200 bg-white">
            <div class="max-w-md mx-auto p-4">
              <div class="flex items-center justify-between mb-3">
                <div class="text-neutral-500">Итого</div>
                <div class="text-lg font-semibold">${formatPrice(total)}</div>
              </div>
              <button
                class="w-full rounded-2xl bg-black text-white py-4 text-sm font-medium ${cart.length === 0 ? "opacity-50" : ""}"
                onclick="goCheckout()"
                ${cart.length === 0 ? "disabled" : ""}
              >
                Оформить заказ
              </button>
            </div>
          </div>
        `;
      }

      function renderCheckout() {
        const app = document.getElementById("app");
        const total = cart.reduce((sum, item) => sum + item.price, 0);

        app.innerHTML = `
          ${renderHeader("Оформление заказа", true, "cart")}
          <div class="max-w-md mx-auto px-4 pb-32">
            <div class="pt-4 rounded-3xl bg-white border border-neutral-200 shadow-sm p-4 space-y-3">
              <input id="name" class="w-full rounded-2xl border border-neutral-200 px-4 py-3 outline-none" placeholder="Имя" />
              <input id="phone" class="w-full rounded-2xl border border-neutral-200 px-4 py-3 outline-none" placeholder="Телефон" />
              <input id="tgname" class="w-full rounded-2xl border border-neutral-200 px-4 py-3 outline-none" placeholder="Telegram @username" />
              <textarea id="comment" class="w-full rounded-2xl border border-neutral-200 px-4 py-3 outline-none min-h-24" placeholder="Комментарий к заказу"></textarea>
            </div>

            <div class="mt-4 rounded-3xl bg-white border border-neutral-200 shadow-sm p-4">
              <div class="font-medium">Ваш заказ</div>
              <div class="mt-3 space-y-2">
                ${cart
                  .map(
                    (item) => `
                  <div class="flex items-center justify-between text-sm">
                    <div>${item.title}${item.size ? `, ${item.size}` : ""}</div>
                    <div>${formatPrice(item.price)}</div>
                  </div>
                `
                  )
                  .join("")}
              </div>
              <div class="flex items-center justify-between mt-4 pt-3 border-t border-neutral-200">
                <div class="text-neutral-500">Итого</div>
                <div class="text-lg font-semibold">${formatPrice(total)}</div>
              </div>
            </div>
          </div>

          <div class="fixed bottom-0 left-0 right-0 border-t border-neutral-200 bg-white">
            <div class="max-w-md mx-auto p-4">
              <button class="w-full rounded-2xl bg-black text-white py-4 text-sm font-medium" onclick="submitOrder()">
                Подтвердить заказ
              </button>
            </div>
          </div>
        `;
      }

      function renderSuccess() {
        const app = document.getElementById("app");
        app.innerHTML = `
          ${renderHeader("Заказ отправлен")}
          <div class="max-w-md mx-auto px-4">
            <div class="min-h-[70vh] flex items-center">
              <div class="w-full rounded-3xl bg-white border border-neutral-200 shadow-sm p-6 text-center">
                <div class="text-5xl mb-4">✅</div>
                <div class="text-2xl font-semibold">Спасибо за заказ</div>
                <div class="text-neutral-500 mt-2">Продавец скоро свяжется с вами в Telegram или по телефону.</div>
                <button class="mt-6 w-full rounded-2xl bg-black text-white py-4 text-sm font-medium" onclick="goTo('store')">
                  Вернуться в магазин
                </button>
              </div>
            </div>
          </div>
        `;
      }

      function renderBottomBar() {
        return `
          <div class="fixed bottom-0 left-0 right-0 border-t border-neutral-200 bg-white">
            <div class="max-w-md mx-auto grid grid-cols-2 gap-3 p-4">
              <button class="rounded-2xl border border-neutral-200 py-3 text-sm" onclick="goTo('store')">Магазин</button>
              <button class="rounded-2xl bg-black text-white py-3 text-sm" onclick="goTo('cart')">
                Корзина ${cart.length ? `(${cart.length})` : ""}
              </button>
            </div>
          </div>
        `;
      }

      function searchProducts(query) {
        const q = query.trim().toLowerCase();
        const filtered = products.filter(
          (p) =>
            p.title.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q)
        );
        const grid = document.getElementById("product-grid");
        grid.innerHTML = renderProductGrid(filtered);
      }

      function openProduct(productId) {
        selectedProduct = products.find((p) => p.id === productId);
        selectedSize = selectedProduct.sizes[0] || "";
        screen = "product";
        render();
      }

      function selectSize(size) {
        selectedSize = size;
        renderProduct();
      }

      function addToCart() {
        if (!selectedProduct) return;
        cart.push({
          ...selectedProduct,
          size: selectedSize,
        });
        if (tg) tg.HapticFeedback?.impactOccurred("light");
        screen = "cart";
        render();
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
      }

      function goCheckout() {
        if (!cart.length) return;
        screen = "checkout";
        render();
      }

      async function submitOrder() {
        const name = document.getElementById("name")?.value || "";
        const phone = document.getElementById("phone")?.value || "";
        const tgname = document.getElementById("tgname")?.value || "";
        const comment = document.getElementById("comment")?.value || "";

        const itemsText = cart
          .map((item) => `${item.title}${item.size ? ` (${item.size})` : ""}`)
          .join(", ");

        const payload = {
          name: name || "Без имени",
          phone: phone || "Не указан",
          tgname: tgname || "",
          items: `${itemsText}${comment ? ` | Комментарий: ${comment}` : ""}`,
        };

        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
              Prefer: "return=representation",
            },
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            const errorText = await res.text();
            console.error("Supabase error:", errorText);
            alert("Ошибка при отправке заказа");
            return;
          }

          const data = await res.json();
          console.log("Заказ сохранён:", data);

          if (tg) tg.HapticFeedback?.notificationOccurred("success");

          cart = [];
          screen = "success";
          render();
        } catch (error) {
          console.error("Network error:", error);
          alert("Ошибка сети");
        }
      }

      function goTo(target) {
        screen = target;
        render();
      }

      function render() {
        if (screen === "store") return renderStore();
        if (screen === "product") return renderProduct();
        if (screen === "cart") return renderCart();
        if (screen === "checkout") return renderCheckout();
        if (screen === "success") return renderSuccess();
      }

      render();
    </script>
  </body>
</html>
